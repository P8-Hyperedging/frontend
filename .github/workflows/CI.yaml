name: Build and push frontend image

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno lint
        run: deno lint

      - name: Run Deno fmt
        run: deno fmt